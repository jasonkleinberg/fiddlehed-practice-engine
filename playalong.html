<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FiddleHed Practice Engine — 3-Layer Play-Along (prototype)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 960px;   /* widened for the sheet-music view (was 640px) */
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.5;
    }
    h1 { margin-bottom: 0.25rem; }
    .tune-title { color: #555; font-style: italic; margin-top: 0; }
    .controls {
      margin: 1.5rem 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    .picker { display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; }
    .picker input[type="text"] { flex: 1 1 12rem; padding: 0.4rem 0.6rem; font-size: 0.95rem; }
    .picker select { flex: 2 1 16rem; padding: 0.4rem; font-size: 0.95rem; max-width: 100%; }
    .lesson-link { font-size: 0.9rem; }
    .sections { margin: 0.75rem 0; display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }
    .sections .sections-label { font-size: 0.9rem; color: #666; margin-right: 0.25rem; }
    .sections button { padding: 0.3rem 0.7rem; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 4px; background: #fff; }
    .sections button.active { background: #990034; border-color: #990034; color: #fff; }
    .slider { margin: 1rem 0; }
    .slider label { display: block; margin-bottom: 0.25rem; }
    .slider input[type="range"] { width: 100%; }
    .layers {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 0.5rem 1rem 1rem;
      margin-top: 1.5rem;
    }
    .layers h2 { font-size: 1rem; margin: 0.75rem 0 0; color: #444; }
    .status { margin-top: 1rem; color: #666; font-size: 0.9rem; min-height: 1.2em; }
    .hint { color: #999; font-size: 0.8rem; }

    /* ---- Sheet music (OSMD) ---- */
    .score-wrap {
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-top: 1.5rem;
      padding: 0.5rem 0.75rem 1rem;
      background: #fff;
      overflow-x: auto;   /* narrow screens: score scrolls sideways, not the page */
    }
    .score-wrap .score-hint {
      color: #999; font-size: 0.8rem; margin: 0.25rem 0 0;
    }
    #score { min-height: 120px; }
    #score svg { display: block; }
    /* Notes are clickable (click-to-seek) */
    .pe-note-click { cursor: pointer; }
    /* The sounding note: FiddleHed red. CSS beats VexFlow's presentation
       attributes, and removing the class reverts cleanly. */
    .pe-active, .pe-active * {
      fill: #990034 !important;
      stroke: #990034 !important;
    }
    /* Gray band behind the bars of the active loop section */
    .pe-section-shade {
      fill: #888;
      opacity: 0.13;
      pointer-events: none;   /* clicks pass through to the notes */
    }
  </style>
</head>
<body>
  <h1>FiddleHed Practice Engine</h1>
  <p class="tune-title" id="tune-title">Loading tune…</p>
  <p><a class="lesson-link" id="lesson-link" href="#" target="_blank" rel="noopener" style="display:none">Watch the lesson →</a></p>

  <div class="picker">
    <input type="text" id="tune-search" placeholder="Search tunes…" aria-label="Search tunes" />
    <select id="tune-select" aria-label="Choose a tune"></select>
  </div>

  <div class="controls">
    <button id="play" disabled>Play</button>
    <button id="pause" disabled>Pause</button>
    <button id="stop" disabled>Stop</button>
  </div>

  <div class="sections" id="sections"></div>

  <div class="slider tempo">
    <label for="tempo">Tempo: <span id="tempo-readout">80 BPM</span></label>
    <input type="range" id="tempo" min="40" max="200" value="80" step="1" />
  </div>

  <div class="score-wrap">
    <div id="score" aria-label="Sheet music"></div>
    <p class="score-hint">Click any note to jump there. The red note is what's playing.</p>
  </div>

  <div class="layers">
    <h2>Melody (violin)</h2>
    <div class="slider">
      <label for="melody-volume">Volume: <span id="melody-volume-readout">30%</span></label>
      <input type="range" id="melody-volume" min="0" max="100" value="30" step="1" />
    </div>

    <h2>Organ (chords)</h2>
    <div class="slider">
      <label for="organ-volume">Volume: <span id="organ-volume-readout">30%</span></label>
      <input type="range" id="organ-volume" min="0" max="100" value="30" step="1" />
    </div>

    <h2>Kick (beat)</h2>
    <div class="slider">
      <label for="kick-volume">Volume: <span id="kick-volume-readout">100%</span></label>
      <input type="range" id="kick-volume" min="0" max="100" value="100" step="1" />
    </div>
  </div>

  <p class="status" id="status">Initializing…</p>
  <p class="hint">Spacebar toggles play/pause. Three layers, one Tone.js clock. <span id="version"></span></p>

  <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.9.0/build/opensheetmusicdisplay.min.js"></script>
  <script src="js/playalong.js"></script>
</body>
</html>
